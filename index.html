<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Tracker</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="description" content="Personal and business software spend — subscription tracker" />
  <meta property="og:title" content="Subscription Tracker" />
  <meta property="og:description" content="Personal and business software spend" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kissmeh02.github.io/software-subscription-tracker/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <h1>Subscription Tracker</h1>
        <p>Personal &amp; business software spend</p>
      </div>
      <div class="header-actions">
        <div class="currency-toggle">
          <button type="button" class="currency-btn active" data-currency="CAD">CAD</button>
          <button type="button" class="currency-btn" data-currency="USD">USD</button>
        </div>
        <button type="button" class="btn btn-sm" data-action="export-csv">↓ Export CSV</button>
        <button type="button" class="btn btn-sm" data-action="reminders">🔔 Reminders</button>
        <button type="button" class="btn btn-accent" data-action="add-subscription">+ Add</button>
      </div>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="trend">Spend trend</button>
    </div>

    <div id="tab-overview" class="tab-panel active">
      <div class="charts-row" id="charts"></div>
    </div>
    <div id="tab-trend" class="tab-panel">
      <div class="trend-card">
        <div class="trend-header">
          <div class="trend-header-title">Monthly spend over time (projected 12 months)</div>
        </div>
        <div class="chart-wrap">
          <canvas id="trendChart" role="img" aria-label="Monthly spend trend chart"></canvas>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="search" id="search" placeholder="Search subscriptions…" autocomplete="off" />
      </div>
      <select id="filterCat">
        <option value="">All categories</option>
        <option value="work">Work</option>
        <option value="personal">Personal</option>
      </select>
      <select id="filterStatus">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="paused">Paused</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select id="sortBy">
        <option value="name">Sort: Name</option>
        <option value="cost-desc">Sort: Cost ↓</option>
        <option value="cost-asc">Sort: Cost ↑</option>
        <option value="renewal">Sort: Renewal</option>
      </select>
    </div>

    <div id="list"></div>
  </div>

  <div class="modal-backdrop" id="modal" style="display:none" role="presentation">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-title" id="modal-title">Add subscription</div>
      <div class="form-row">
        <label class="form-label" for="f-name">Name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Figma, Slack, Netflix" />
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label" for="f-cost">Cost</label>
          <input class="form-input" id="f-cost" type="number" min="0" step="0.01" placeholder="12.99" />
        </div>
        <div>
          <label class="form-label" for="f-cycle">Billing cycle</label>
          <select class="form-input" id="f-cycle">
            <option value="monthly">Monthly</option>
            <option value="annual">Annual</option>
            <option value="weekly">Weekly</option>
          </select>
        </div>
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label" for="f-cat">Category</label>
          <select class="form-input" id="f-cat">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
          </select>
        </div>
        <div>
          <label class="form-label" for="f-status">Status</label>
          <select class="form-input" id="f-status">
            <option value="active">Active</option>
            <option value="paused">Paused</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label" for="f-renewal">Renewal date</label>
        <input class="form-input" id="f-renewal" type="date" />
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label" for="f-icon">Icon / emoji</label>
          <input class="form-input" id="f-icon" placeholder="🎨" maxlength="4" />
        </div>
        <div>
          <label class="form-label" for="f-notes">Notes</label>
          <input class="form-input" id="f-notes" placeholder="e.g. Team plan, 5 seats" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" data-action="modal-cancel">Cancel</button>
        <button type="button" class="btn btn-primary" data-action="modal-save">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="reminder-modal" style="display:none" role="presentation">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-title">Renewal reminders</div>
      <p style="font-size:0.78rem;color:var(--text3);margin-bottom:1rem;">Copy any reminder text to paste into your calendar or Notion database.</p>
      <div class="reminder-list" id="reminder-list"></div>
      <button type="button" class="btn btn-primary copy-all-btn" data-action="reminder-copy-all">Copy all reminders</button>
      <div class="modal-footer" style="padding-top:0.75rem;margin-top:0.5rem;">
        <button type="button" class="btn" data-action="reminder-close">Close</button>
      </div>
    </div>
  </div>
</body>
</html>
